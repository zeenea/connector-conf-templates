# Enables lineage with external sources.
# Please provide the Denodo JDBC driver JAR file in the <SCANNER_HOME>/lib-ext folder
# when enabling this feature. Restart the scanner after copying the JAR.
# The driver can be downloaded from the Denodo Community website, from the following
# locations, depending on your Denodo server version:
#       - Denodo 8 : https://community.denodo.com/drivers/jdbc/8.0
#       - Denodo 9 : https://community.denodo.com/drivers/jdbc/9
# Alternatively, download the driver directly from the Denodo server.
# The location is: <DENODO_HOME>/tools/client-drivers/jdbc/denodo-vdp-jdbcdriver.jar,
# where <DENODO_HOME> is the root installation folder of the Denodo Platform.
# Common <DENODO_HOME> values are C:\Denodo\DenodoPlatform9\ on Windows, and /opt/denodo/denodo_platform_9 on Linux.
lineage.enabled = "false"

# VDP servers
#
# A space-separated list of VDP servers for inventorying.
# Servers should be defined using the URL format //host:port/admin, via a server ID number, or a mix of both.
# If this field is left empty (default), the scanner will inventory all VDP servers configured within the
# Denodo Data Catalog.
# Example: Two servers via URL format:
# vdp_server.list = "//denodo1.local:9999/admin //denodo2.local:9999/admin"
# Example: Mixed configuration using one URL and two server IDs:
# vdp_server.list = "105 //denodo1.local:9999/admin 1"
#
# vdp_server.list = ""

# Default VDP server
#
# Default VDP server to use for retrieving the list of configured VDP servers.
# Server URL, ID, or both values can be specified.
# When both values are specified, they must correspond to the same VDP server.
#
# Example: Default VDP server specified by URL
# vdp_server.default.uri = "//localhost:9999/admin"
#
# Example: Default VDP server specified by ID
# vdp_server.default.server_id = "1"
#
# vdp_server.default.uri = ""
# vdp_server.default.server_id = ""

# Filter
#
# Filter the relations (tables or views) that should be kept in the inventory.
# Use the rich filter language described in documentation.
# https://docs.actian.com/data-intelligence-platform/technical-documentation/scanners/zeenea-filters.html
#
# filter keys are:
#   serverUrl: the server URL. (Example: '//denodo.example.com:9090/admin')
#   database : the database name.
#   view     : the view name.
#   type     : the view type ('derived', 'interface', 'base')
#
# Example:
#   filter = """
#           database in ('PRODUCTION', 'QA')
#       and (
#              view starts with 'CUSTOM_' and not view ends with '_BAK'
#           or type in ('derived', 'interface')
#           )
#   """
#
# Note: Filter can contain either the raw value or a file URL to the content.
# Example:
#   filter = "file:///path/to/zeenea/connections/denodo-filter.json"
#
# When using a side-file, filter changes are taken into account without restarting the scanner.
#
# filter = ""

# Data profiling max rows
# Defines the approximate number of rows that will be used to create the data profiling.
# Default value is 10000.
